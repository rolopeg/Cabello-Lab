            <script>function neighbourhoodHighlight(params) {
  
  allNodes = nodes.get({ returnType: "Object" });
  
  if (params.nodes.length > 0) {
    highlightActive = true;
    var i, j;
    var selectedNode = params.nodes[0];
    var degrees = 2;

    
    for (let nodeId in allNodes) {
      
      allNodes[nodeId].color = "rgba(200,200,200,0.5)";
      if (allNodes[nodeId].hiddenLabel === undefined) {
        allNodes[nodeId].hiddenLabel = allNodes[nodeId].label;
        allNodes[nodeId].label = undefined;
      }
    }
    var connectedNodes = network.getConnectedNodes(selectedNode);
    var allConnectedNodes = [];

    
    for (i = 1; i < degrees; i++) {
      for (j = 0; j < connectedNodes.length; j++) {
        allConnectedNodes = allConnectedNodes.concat(
          network.getConnectedNodes(connectedNodes[j])
        );
      }
    }

    
    for (i = 0; i < allConnectedNodes.length; i++) {
      allNodes[allConnectedNodes[i]].color = "rgba(150,150,150,0.75)";
      if (allNodes[allConnectedNodes[i]].hiddenLabel !== undefined) {
        allNodes[allConnectedNodes[i]].label =
          allNodes[allConnectedNodes[i]].hiddenLabel;
        allNodes[allConnectedNodes[i]].hiddenLabel = undefined;
      }
    }

    
    for (i = 0; i < connectedNodes.length; i++) {
      allNodes[connectedNodes[i]].color = nodeColors[connectedNodes[i]];
      if (allNodes[connectedNodes[i]].hiddenLabel !== undefined) {
        allNodes[connectedNodes[i]].label =
          allNodes[connectedNodes[i]].hiddenLabel;
        allNodes[connectedNodes[i]].hiddenLabel = undefined;
      }
    }

    allNodes[selectedNode].color = nodeColors[selectedNode];
    if (allNodes[selectedNode].hiddenLabel !== undefined) {
      allNodes[selectedNode].label = allNodes[selectedNode].hiddenLabel;
      allNodes[selectedNode].hiddenLabel = undefined;
    }
  } else if (highlightActive === true) {
    for (let nodeId in allNodes) {
      allNodes[nodeId].color = nodeColors[nodeId];
      if (allNodes[nodeId].hiddenLabel !== undefined) {
        allNodes[nodeId].label = allNodes[nodeId].hiddenLabel;
        allNodes[nodeId].hiddenLabel = undefined;
      }
    }
    highlightActive = false;
  }


  var updateArray = [];
  if (params.nodes.length > 0) {
    for (let nodeId in allNodes) {
      if (allNodes.hasOwnProperty(nodeId)) {
        // console.log(allNodes[nodeId]);
        updateArray.push(allNodes[nodeId]);
      }
    }
    nodes.update(updateArray);
  } else {
    
    for (let nodeId in allNodes) {
      if (allNodes.hasOwnProperty(nodeId)) {
        updateArray.push(allNodes[nodeId]);
      }
    }
    nodes.update(updateArray);
  }
}

function filterHighlight(params) {
  allNodes = nodes.get({ returnType: "Object" });
  if (params.nodes.length > 0) {
    filterActive = true;
    let selectedNodes = params.nodes;

    for (let nodeId in allNodes) {
      allNodes[nodeId].hidden = true;
      if (allNodes[nodeId].savedLabel === undefined) {
        allNodes[nodeId].savedLabel = allNodes[nodeId].label;
        allNodes[nodeId].label = undefined;
      }
    }

    for (let i=0; i < selectedNodes.length; i++) {
      allNodes[selectedNodes[i]].hidden = false;
      if (allNodes[selectedNodes[i]].savedLabel !== undefined) {
        allNodes[selectedNodes[i]].label = allNodes[selectedNodes[i]].savedLabel;
        allNodes[selectedNodes[i]].savedLabel = undefined;
      }
    }

  } else if (filterActive === true) {
    for (let nodeId in allNodes) {
      allNodes[nodeId].hidden = false;
      if (allNodes[nodeId].savedLabel !== undefined) {
        allNodes[nodeId].label = allNodes[nodeId].savedLabel;
        allNodes[nodeId].savedLabel = undefined;
      }
    }
    filterActive = false;
  }

  var updateArray = [];
  if (params.nodes.length > 0) {
    for (let nodeId in allNodes) {
      if (allNodes.hasOwnProperty(nodeId)) {
        updateArray.push(allNodes[nodeId]);
      }
    }
    nodes.update(updateArray);
  } else {
    for (let nodeId in allNodes) {
      if (allNodes.hasOwnProperty(nodeId)) {
        updateArray.push(allNodes[nodeId]);
      }
    }
    nodes.update(updateArray);
  }
}

function selectNode(nodes) {
  network.selectNodes(nodes);
  neighbourhoodHighlight({ nodes: nodes });
  return nodes;
}

function selectNodes(nodes) {
  network.selectNodes(nodes);
  filterHighlight({nodes: nodes});
  return nodes;
}

function highlightFilter(filter) {
  let selectedNodes = []
  let selectedProp = filter['property']
  if (filter['item'] === 'node') {
    let allNodes = nodes.get({ returnType: "Object" });
    for (let nodeId in allNodes) {
      if (allNodes[nodeId][selectedProp] && filter['value'].includes((allNodes[nodeId][selectedProp]).toString())) {
        selectedNodes.push(nodeId)
      }
    }
  }
  else if (filter['item'] === 'edge'){
    let allEdges = edges.get({returnType: 'object'});
    // check if the selected property exists for selected edge and select the nodes connected to the edge
    for (let edge in allEdges) {
      if (allEdges[edge][selectedProp] && filter['value'].includes((allEdges[edge][selectedProp]).toString())) {
        selectedNodes.push(allEdges[edge]['from'])
        selectedNodes.push(allEdges[edge]['to'])
      }
    }
  }
  selectNodes(selectedNodes)
}</script>

<div id="mainTitleContainer" style="width: 100%; text-align: center; margin-top: 20px; margin-bottom: 25px; padding: 0 15px; box-sizing: border-box; position: relative; z-index: 50;">
    <h1 style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 26px; font-weight: bold; color: #2c3e50; margin-bottom: 5px; margin-top: 0;">
        <i>Caenorhabditis elegans</i> Integrator complex interactome
    </h1>
    <h2 style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: normal; color: #34495e; margin-top: 0; margin-bottom: 0;">
        Co-immunoprecipitation (Co-IP)
    </h2>
</div>

<script type="text/javascript">
    var allEdges, allNodes;
    var selectedNodes = [];
    var activeNodes = [];
    var legendHtml = '<div id="legend" style="position: absolute; top: 375px; left: 250px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #ccc; font-family: Arial, sans-serif; font-size: 14px; border-radius: 5px;">' +
                   '<strong style="color: white; display: block; padding-bottom: 5px; margin-bottom: 5px; border-bottom: 1px solid #ccc;">Groups</strong><br>' +
                   '<span style="color: #44AA99;">CI: Integrator Complex</span><br>' +
                   '<span style="color: #88CCAA;">Cytoplasm</span><br>' +
                   '<span style="color: #EE8866;">Mitochondria</span><br>' +
                   '<span style="color: #77AADD;">Nucleus</span><br>' +
                   '<span style="color: #DDCC77;">Other</span><br>' +
                   '<span style="color: #BB99DD;">Proteasome</span>' +
                   '</div>';
  document.body.insertAdjacentHTML("afterbegin", legendHtml);


    function clearEdgeLabelsAndColors() {
        var edges = network.body.data.edges.get();
        edges.forEach(function(edge) {
            edge.label = " ";
            edge.color = { color: 'gray' };
        });
        network.body.data.edges.update(edges);
    }

    function highlightEdges(nodeId) {
        var edges = network.body.data.edges.get();
        edges.forEach(function(edge) {
            if (edge.from === nodeId || edge.to === nodeId) {
                edge.color = { color: edge.colorOriginal };
                edge.label = edge.title;
            } else {
                edge.color = { color: 'gray' };
                edge.label = null;
            }
        });
        network.body.data.edges.update(edges);
    }

    function showRelations(nodeId) {
        var edges = network.body.data.edges.get();
        var relationHtml = "";
        edges.forEach(function(edge) {
            if (edge.from === nodeId) {
                var fromNode = network.body.data.nodes.get(edge.from);
                var toNode = network.body.data.nodes.get(edge.to);
                var fromLink = edge.link_source ? edge.link_source : (fromNode.link ? fromNode.link : "#");
                var toLink = edge.link_target ? edge.link_target : (toNode.link ? toNode.link : "#");
                var fromNodeColor = fromNode.color; // Get source node color
                var toNodeColor = toNode.color;     // Get target node color
                relationHtml += '<a href="' + fromLink + '" target="_blank" style="color:' + fromNodeColor + ';" title="Go to WormBase">' + edge.from + '</a> → ' +
                                '<a href="' + toLink + '" target="_blank" style="color:' + toNodeColor + ';" title="Go to WormBase">' + edge.to + '</a> : ' + edge.title + '<br>';
            }
            if (edge.to === nodeId) {
                var fromNode = network.body.data.nodes.get(edge.from);
                var toNode = network.body.data.nodes.get(edge.to);
                var fromLink = edge.link_source ? edge.link_source : (fromNode.link ? fromNode.link : "#");
                var toLink = edge.link_target ? edge.link_target : (toNode.link ? toNode.link : "#");
                var fromNodeColor = fromNode.color; // Get source node color
                var toNodeColor = toNode.color;     // Get target node color
                relationHtml += '<a href="' + toLink + '" target="_blank" style="color:' + toNodeColor + ';" title="Go to WormBase">' + edge.to + '</a> ← ' +
                                '<a href="' + fromLink + '" target="_blank" style="color:' + fromNodeColor + ';" title="Go to WormBase">' + edge.from + '</a>: ' + edge.title + '<br>';
            }
        });
        var nodeData = network.body.data.nodes.get(nodeId);
        var nodeLink = nodeData.link ? nodeData.link : "#";
        var linkHtml = "<br>";
        var fullHtml = "<div style='padding:10px; font-size: 12px;'><strong>" + nodeId + " <span title='Edge Weight (W) represents the interaction strength, derived from experimental data. Log Weight (Log) is a transformed scale for better visualization. Larger weights imply stronger interactions.' style='font-size: 13px;'>Interactions</span></strong><br>" + relationHtml + linkHtml + "</div>";

        var relationBox = document.getElementById("relationBox");
        if (!relationBox) {
            relationBox = document.createElement("div");
            relationBox.id = "relationBox";
            relationBox.style.position = "absolute";
            relationBox.style.top = "75px";
            relationBox.style.right = "10px";
            relationBox.style.zIndex = 1000;
            relationBox.style.backgroundColor = "rgba(0,0,0,0.8)";
            relationBox.style.color = "white";
            relationBox.style.padding = "10px";
            relationBox.style.borderRadius = "5px";
            relationBox.style.maxWidth = "400px";
            relationBox.style.maxHeight = "700px";
            relationBox.style.overflowY = "auto";
            relationBox.style.fontSize = "12px";
            document.body.appendChild(relationBox);
        }
        relationBox.innerHTML = fullHtml;
        relationBox.style.display = "block";
    }

    function hideRelations() {
        var relationBox = document.getElementById("relationBox");
        if(relationBox) {
            relationBox.style.display = "none";
        }
    }

    network.on("selectNode", function (params) {
        selectedNodes = params.nodes;
        if(selectedNodes.length > 0) {
            var selectedId = selectedNodes[0];
            highlightEdges(selectedId);
            showRelations(selectedId);
            network.body.data.edges.update(network.body.data.edges.get());
        }
    });

    network.on("deselectNode", function (params) {
        selectedNodes = network.getSelectedNodes();
        if(selectedNodes.length === 0) {
            clearEdgeLabelsAndColors();
            hideRelations();
        }
    });

    network.on("dragEnd", function (params) {
        if(params.nodes.length > 0) {
            selectedNodes = params.nodes;
            highlightEdges(selectedNodes[0]);
            showRelations(selectedNodes[0]);
        }
    });

    function applyFilter(minWeight) {
        var edges = network.body.data.edges.get();
        var nodes = network.body.data.nodes.get();

        edges.forEach(function(edge) {
            if (activeNodes.indexOf(edge.from) !== -1 && activeNodes.indexOf(edge.to) !== -1) {
                var weight = parseInt(edge.title);
                edge.hidden = weight < minWeight;
            } else {
                edge.hidden = true;
            }
            if (!edge.hidden) {
                edge.color = { color: 'gray' };
                edge.label = null;
            }
        });

        nodes.forEach(function(node) {
            if (activeNodes.indexOf(node.id) !== -1) {
                var hasVisibleEdge = edges.some(function(edge) {
                    return !edge.hidden && (edge.from === node.id || edge.to === node.id);
                });
                node.hidden = !hasVisibleEdge;
            } else {
                node.hidden = true;
            }
        });

        network.body.data.edges.update(edges);
        network.body.data.nodes.update(nodes);
    }

    network.once("afterDrawing", function () {
        allEdges = network.body.data.edges.get();
        allNodes = network.body.data.nodes.get();
        activeNodes = allNodes.map(function(node) { return node.id; });

        var slider = document.createElement("input");
        slider.type = "range";
        slider.min = 0;
        slider.max = 130;
        slider.value = 0;
        slider.style.position = "absolute";
        slider.style.top = "30px";
        slider.style.left = "50px";
        slider.style.zIndex = 999;

        var label = document.createElement("span");
        label.style.position = "absolute";
        label.style.top = "30px";
        label.style.left = "200px";
        label.style.zIndex = 999;
        label.style.color = "gray";
        label.innerHTML = "Min Weight Delection: 0";

        slider.oninput = function () {
            applyFilter(parseInt(slider.value));
            label.innerHTML = "Min Weight Deletion: " + slider.value;
        };

        document.body.appendChild(slider);
        document.body.appendChild(label);

        var checkboxContainer = document.createElement("div");
        checkboxContainer.id = "nodeCheckboxes";
        checkboxContainer.style.position = "absolute";
        checkboxContainer.style.top = "75px";
        checkboxContainer.style.left = "50px";
        checkboxContainer.style.zIndex = 999;
        checkboxContainer.style.backgroundColor = "rgba(0,0,0,0.8)";
        checkboxContainer.style.padding = "10px";
        checkboxContainer.style.maxHeight = "600px";
        checkboxContainer.style.overflowY = "auto";
        checkboxContainer.style.color = "white";
        checkboxContainer.style.display = "flex";
        checkboxContainer.style.flexDirection = "column";
        checkboxContainer.style.fontSize = "12px";
        checkboxContainer.style.borderRadius = "5px"; /* ESQUINAS REDONDEADAS CONTENEDOR PRINCIPAL */

        var masterRow = document.createElement("div");
        masterRow.style.display = "flex";
        masterRow.style.alignItems = "center";
        masterRow.style.marginBottom = "10px";
        

        var masterCheckbox = document.createElement("input");
        masterCheckbox.type = "checkbox";
        masterCheckbox.id = "cb_all";
        masterCheckbox.checked = true;
        masterCheckbox.style.marginRight = "5px";
    

        var masterLabel = document.createElement("span");
        masterLabel.innerHTML = "All";

        masterRow.appendChild(masterCheckbox);
        masterRow.appendChild(masterLabel);
        checkboxContainer.appendChild(masterRow);

        masterCheckbox.onchange = function() {
            if(masterCheckbox.checked) {
                allNodes.forEach(function(node) {
                    var cb = document.getElementById("cb_" + node.id);
                    if(cb) { cb.checked = true; }
                });
                activeNodes = allNodes.map(function(node) { return node.id; });
                applyFilter(parseInt(slider.value));
            }
        };

        var groups = {};
        allNodes.forEach(function(node) {
            var grp = node.mygroup;
            if (!groups[grp]) {
                groups[grp] = [];
            }
            groups[grp].push(node);
        });

        var groupNames = Object.keys(groups);
        groupNames.sort(function(a, b) {
            if(a.toLowerCase() === "ci") return -1;
            if(b.toLowerCase() === "ci") return 1;
            return a.localeCompare(b);
        });

        groupNames.forEach(function(grp) {
            var subContainer = document.createElement("div");
            subContainer.id = "container_" + grp;
            subContainer.style.marginBottom = "10px";
            subContainer.style.border = "1px solid #fff";
            subContainer.style.padding = "5px";
            subContainer.style.borderRadius = "5px"; /* ESQUINAS REDONDEADAS SUB-CONTENEDOR */

            var header = document.createElement("div");
            header.style.marginBottom = "5px";
            var headerColor = "";
            switch(grp.toLowerCase()) {
                case "ci": headerColor = "#44AA99"; break;
                case "cytoplasm": headerColor = "#88CCAA"; break;
                case "mitochondria": headerColor = "#EE8866"; break;
                case "nucleus": headerColor = "#77AADD"; break;
                case "other": headerColor = "#DDCC77"; break;
                case "proteasome": headerColor = "#BB99DD"; break;
                default: headerColor = "gray";
            }
            header.innerHTML = grp.toLowerCase() === "ci" ? "<strong>Integrator Complex</strong>" : "<strong style='color:" + headerColor + "; font-size: 13px;'>" + grp.charAt(0).toUpperCase() + grp.slice(1) + "</strong>";
            subContainer.appendChild(header);

            var groupMasterDiv = document.createElement("div");
            groupMasterDiv.style.display = "flex";
            groupMasterDiv.style.alignItems = "center";
            groupMasterDiv.style.marginBottom = "5px";

            var groupMasterCheckbox = document.createElement("input");
            groupMasterCheckbox.type = "checkbox";
            groupMasterCheckbox.id = "cb_all_" + grp;
            groupMasterCheckbox.checked = true;
            groupMasterCheckbox.style.marginRight = "5px";

            var groupMasterLabel = document.createElement("span");
            groupMasterLabel.innerHTML = grp.toLowerCase() === "ci" ? "Integrator Complex" : grp.charAt(0).toUpperCase() + grp.slice(1);
            groupMasterDiv.appendChild(groupMasterCheckbox);
            groupMasterDiv.appendChild(groupMasterLabel);
            subContainer.appendChild(groupMasterDiv);

            groups[grp].forEach(function(node) {
                var rowDiv = document.createElement("div");
                rowDiv.style.display = "flex";
                rowDiv.style.alignItems = "center";
                rowDiv.style.marginBottom = "5px";

                var checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.className = "nodeCheckbox";
                checkbox.id = "cb_" + node.id;
                checkbox.checked = true;
                checkbox.style.marginRight = "5px";

                checkbox.onchange = function() {
                    if (checkbox.checked) {
                        if (activeNodes.indexOf(node.id) === -1) {
                            activeNodes.push(node.id);
                        }
                    } else {
                        var idx = activeNodes.indexOf(node.id);
                        if (idx !== -1) { activeNodes.splice(idx, 1); }
                        var overallMaster = document.getElementById("cb_all");
                        if (overallMaster && overallMaster.checked) { overallMaster.checked = false; }
                    }
                    var groupCheckboxes = subContainer.querySelectorAll("input.nodeCheckbox");
                    var allChecked = true;
                    groupCheckboxes.forEach(function(cb) {
                        if (!cb.checked) { allChecked = false; }
                    });
                    var groupMaster = document.getElementById("cb_all_" + grp);
                    if (groupMaster) { groupMaster.checked = allChecked; }
                    applyFilter(parseInt(slider.value));
                };

                var colorCircle = document.createElement("div");
                colorCircle.style.width = "12px";
                colorCircle.style.height = "12px";
                colorCircle.style.borderRadius = "50%";
                colorCircle.style.backgroundColor = node.color;
                colorCircle.style.marginRight = "8px";

                var labelSpan = document.createElement("span");
                labelSpan.innerHTML = node.label;

                rowDiv.appendChild(checkbox);
                rowDiv.appendChild(colorCircle);
                rowDiv.appendChild(labelSpan);

                subContainer.appendChild(rowDiv);
            });

            groupMasterCheckbox.onchange = function() {
                var groupCheckboxes = subContainer.querySelectorAll("input.nodeCheckbox");
                if (groupMasterCheckbox.checked) {
                    groupCheckboxes.forEach(function(cb) {
                        cb.checked = true;
                        var nodeId = cb.id.replace("cb_", "");
                        if (activeNodes.indexOf(nodeId) === -1) {
                            activeNodes.push(nodeId);
                        }
                    });
                } else {
                    groupCheckboxes.forEach(function(cb) {
                        cb.checked = false;
                        var nodeId = cb.id.replace("cb_", "");
                        var idx = activeNodes.indexOf(nodeId);
                        if (idx !== -1) {
                            activeNodes.splice(idx, 1);
                        }
                    });
                }
                applyFilter(parseInt(slider.value));
            };

            checkboxContainer.appendChild(subContainer);
        });

        document.body.appendChild(checkboxContainer);
    });

<script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function() {
        var physicsCheckbox = document.createElement("input");
        physicsCheckbox.type = "checkbox";
        physicsCheckbox.id = "physicsToggle";
        physicsCheckbox.checked = true;

        physicsCheckbox.onchange = function() {
            var enabled = physicsCheckbox.checked;
            network.setOptions({
                physics: { enabled: enabled }
            });
        };

        var physicsLabel = document.createElement("label");
        physicsLabel.htmlFor = "physicsToggle";
        physicsLabel.style.marginLeft = "5px";
        physicsLabel.innerHTML = "Physics Enabled"; # More descriptive label

        var physicsDiv = document.createElement("div");
        physicsDiv.id = "physicsToggleDiv";
        physicsDiv.style.position = "absolute";
        physicsDiv.style.top = "10px";
        physicsDiv.style.right = "10px";
        physicsDiv.style.zIndex = "1000";
        physicsDiv.style.backgroundColor = "rgba(0,0,0,0.5)";
        physicsDiv.style.padding = "5px";
        physicsDiv.style.color = "white";
        physicsDiv.style.fontFamily = "Arial, sans-serif";
        physicsDiv.appendChild(physicsCheckbox);
        physicsDiv.appendChild(physicsLabel);

        document.body.appendChild(physicsDiv);

        var defaultPhysicsPanel = document.querySelector("div.vis-ui");
        if (defaultPhysicsPanel) {
            defaultPhysicsPanel.style.display = "none";
        }
    });
</script>
